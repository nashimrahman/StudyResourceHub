<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Resource Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eef4ff",
                100: "#dae7ff",
                500: "#316bff",
                600: "#2557d6"
              }
            }
          }
        }
      };
    </script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur">
      <div class="mx-auto flex w-full max-w-7xl flex-col gap-3 px-4 py-3 sm:px-6 lg:px-8">
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
          <h1 class="text-xl font-bold text-slate-900">Campus Resource Hub</h1>
          <div class="flex w-full flex-col gap-2 sm:flex-row md:w-auto">
            <div class="relative w-full md:w-80">
              <input
                id="searchInput"
                type="search"
                placeholder="Search by title or subject"
                class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm shadow-sm outline-none ring-brand-500 transition focus:border-brand-500 focus:ring-2"
              />
            </div>
            <a
              id="uploadButton"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              class="inline-flex items-center justify-center rounded-lg bg-brand-500 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-600"
            >
              Upload Resource
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <div class="grid grid-cols-1 gap-3 md:grid-cols-4">
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-slate-600">Department</span>
            <select id="departmentFilter" class="rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-brand-500 focus:border-brand-500 focus:ring-2">
              <option value="">All Departments</option>
            </select>
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-slate-600">Year</span>
            <select id="yearFilter" class="rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-brand-500 focus:border-brand-500 focus:ring-2">
              <option value="">All Years</option>
            </select>
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-slate-600">Type</span>
            <select id="typeFilter" class="rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-brand-500 focus:border-brand-500 focus:ring-2">
              <option value="">All Types</option>
            </select>
          </label>
          <label class="flex flex-col gap-1">
            <span class="text-sm font-medium text-slate-600">Sort By</span>
            <select id="sortSelect" class="rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none ring-brand-500 focus:border-brand-500 focus:ring-2">
              <option value="latest">Latest</option>
              <option value="alphabetical">Alphabetical</option>
            </select>
          </label>
        </div>
      </section>

      <section class="mt-6">
        <div id="loadingState" class="hidden rounded-xl border border-slate-200 bg-white p-8 text-center shadow-sm">
          <div class="mx-auto h-10 w-10 animate-spin rounded-full border-4 border-slate-200 border-t-brand-500"></div>
          <p class="mt-3 text-sm text-slate-600">Loading resources...</p>
        </div>
        <div id="errorState" class="hidden rounded-xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-700"></div>
        <div id="emptyState" class="hidden rounded-xl border border-slate-200 bg-white p-8 text-center text-slate-600 shadow-sm">
          No resources found.
        </div>

        <div id="recentSection" class="hidden mb-6">
          <h2 class="mb-3 text-lg font-semibold text-slate-900">Recently Added</h2>
          <div id="recentGrid" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
        </div>

        <h2 class="mb-3 text-lg font-semibold text-slate-900">All Resources</h2>
        <div id="resourceGrid" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
